<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>编辑员工信息</title>
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 100px;
        }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
        }
        .readonly-field {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <h1>编辑员工信息</h1>
    
    <form th:action="@{/hr/employee/edit}" method="post" th:object="${employee}">
        <input type="hidden" name="id" th:value="*{id}" />
        <input type="hidden" name="originalPermission" th:value="*{permission}" />
        
        <div class="form-group">
            <label>工号：</label>
            <input type="text" name="number" th:value="*{number}" class="readonly-field" readonly/>
        </div>
        <div class="form-group">
            <label>姓名：</label>
            <input type="text" name="name" th:value="*{name}" required/>
        </div>
        <div class="form-group">
            <label>部门：</label>
            <input type="text" name="bumen" th:value="*{bumen}" required/>
        </div>
        <div class="form-group">
            <label>职位：</label>
            <input type="text" name="zhiwei" th:value="*{zhiwei}" required/>
        </div>
        <div class="form-group">
            <label>出生日期：</label>
            <input type="text" name="birth" th:value="*{birth}" required/>
        </div>
        <div class="form-group">
            <label>性别：</label>
            <select name="sex" th:field="*{sex}">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-group">
            <label>薪资：</label>
            <input type="number" name="salary" th:value="*{salary}" required/>
        </div>
        
        <button type="submit" class="btn">保存修改</button>
        <a href="/hr/employees" class="btn" style="background-color: #f44336;">取消</a>
    </form>
</body>
</html>
