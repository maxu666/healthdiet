<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>新员工</title>
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 100px;
        }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <h1>添加新员工</h1>
    
    <form th:action="@{/admin/employee/add}" method="post">
        <div class="form-group">
            <label>工号：</label>
            <input type="text" name="number" required/>
        </div>
        <div class="form-group">
            <label>姓名：</label>
            <input type="text" name="name" required/>
        </div>
        <div class="form-group">
            <label>部门：</label>
            <input type="text" name="bumen" required/>
        </div>
        <div class="form-group">
            <label>职位：</label>
            <input type="text" name="zhiwei" required/>
        </div>
        <div class="form-group">
            <label>出生日期：</label>
            <input type="text" name="birth" placeholder="YYYY-MM-DD" required/>
        </div>
        <div class="form-group">
            <label>性别：</label>
            <select name="sex">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-group">
            <label>薪资：</label>
            <input type="number" name="salary" required/>
        </div>
        <div class="form-group">
            <label>权限：</label>
            <select name="permission">
                <option value="NORMAL">普通员工</option>
                <option value="HR">人力资源</option>
                <option value="SYSTEM_ADMIN">系统管理员</option>
            </select>
        </div>
        
        <button type="submit" class="btn">添加员工</button>
        <a href="/admin/dashboard" class="btn" style="background-color: #f44336;">取消</a>
    </form>
</body>
</html>
